# TLS ingress: HTTPS only for app traffic (port 80 redirects to HTTPS).
# - /api/...   -> http://api:8080/...        (prefix stripped)
# - /oauth/... -> http://keycloak:8080/...   (prefix stripped; X-Forwarded-Prefix /oauth for Keycloak)
# Keycloak serves standard paths at / on :8080; direct host access: http://localhost:8090/realms/...
# Use static upstream { server ... } — variable proxy_pass + resolver often yields 502 with Docker DNS.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 25m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream api_backend {
        server api:8080;
        keepalive 8;
    }

    upstream keycloak_backend {
        server keycloak:8080;
        keepalive 8;
    }

    # HTTP: redirect everything to HTTPS (no HTTP API surface).
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

        # Root: no public surface (use /api or /oauth).
        location = / {
            return 404;
        }

        location = /api {
            return 301 https://$host/api/;
        }

        location = /oauth {
            return 301 https://$host/oauth/;
        }

        # Backend API (OpenAPI, /health, /v1, WebSocket, etc.)
        location /api/ {
            proxy_pass http://api_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /api;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 10s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Keycloak: public URL /oauth/... ; upstream sees /realms/... at root (see Keycloak reverse-proxy docs).
        location /oauth/ {
            proxy_pass http://keycloak_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Prefix /oauth;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_redirect http://localhost/ https://$host/oauth/;
            proxy_redirect http://127.0.0.1/ https://$host/oauth/;
            proxy_redirect http://keycloak:8080/ https://$host/oauth/;
            proxy_buffer_size 128k;
            proxy_buffers 8 256k;
            proxy_busy_buffers_size 256k;
            proxy_connect_timeout 60s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
