# TLS ingress — use with docker-compose.ingress.yml + Keycloak KC_HTTP_RELATIVE_PATH=/oauth.
#
# - /api/...   → http://api:8080/...     (prefix stripped)
# - /oauth/... → http://keycloak:8080/oauth/...  (path preserved — must match Keycloak relative path)
#
# Do not set X-Forwarded-Prefix for Keycloak when using KC_HTTP_RELATIVE_PATH (avoids double /oauth).

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 25m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream api_backend {
        server api:8080;
        keepalive 8;
    }

    upstream keycloak_backend {
        server keycloak:8080;
        keepalive 8;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

        location = / {
            return 404;
        }

        location = /api {
            return 301 https://$host/api/;
        }

        location = /oauth {
            return 301 https://$host/oauth/;
        }

        location /api/ {
            proxy_pass http://api_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /api;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 10s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Keycloak: keep /oauth prefix on the upstream (KC_HTTP_RELATIVE_PATH=/oauth).
        location /oauth/ {
            proxy_pass http://keycloak_backend/oauth/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_redirect http://localhost/oauth/ https://$host/oauth/;
            proxy_redirect http://localhost:8090/oauth/ https://$host/oauth/;
            proxy_redirect http://127.0.0.1/oauth/ https://$host/oauth/;
            proxy_redirect http://127.0.0.1:8090/oauth/ https://$host/oauth/;
            proxy_redirect http://keycloak:8080/oauth/ https://$host/oauth/;
            proxy_buffer_size 128k;
            proxy_buffers 8 256k;
            proxy_busy_buffers_size 256k;
            proxy_connect_timeout 60s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
