# Local stack for Internal Comm backend dependencies.
# Usage:
#   docker compose up -d
#   docker compose --profile livekit up -d
#   docker compose --profile app up -d --build
#
# TLS ingress (nginx): requires cert/key on the host (see ingress service). Run with API:
#   docker compose --profile app --profile ingress up -d --build
#
# Default ports: Postgres 5432, Redis 6379, MinIO 9000/9001, Keycloak 8090.
# With profile ingress: HTTP 80 → 301 HTTPS; HTTPS 443 routes /api/* → api, /oauth/* → Keycloak (TLS only at nginx).
#
# Host-run API (go run / IDE): use DATABASE_URL with localhost:5432 — Postgres must be up:
#   docker compose up -d postgres
#   docker compose ps    # expect 127.0.0.1:5432->5432/tcp
# API in Compose (profile app): use host `postgres`, not localhost (see `api` service env).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      # Bind IPv4 loopback so host tools (go run on Windows) reliably reach the container.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/docker/init-db.sql:/docker-entrypoint-initdb.d/10-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Keycloak: standard paths at / on :8090 (/realms/..., /admin/...). Ingress maps https://host/oauth/ → keycloak:8080/
  # with X-Forwarded-Prefix (see deploy/docker/nginx/nginx.conf). Do NOT set KC_HTTP_RELATIVE_PATH here — it must match nginx.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command:
      - start-dev
      - --http-port=8080
      - --hostname-strict=false
    environment:
      # TLS terminates at nginx; Keycloak sees HTTP from the proxy and must trust X-Forwarded-* (set by nginx).
      # KC_PROXY_HEADERS: xforwarded
      # KC_HTTP_ENABLED: "true"
      # KC_HOSTNAME: https://localhost/oauth
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HEALTH_ENABLED: "true"
    ports:
      # Direct: http://localhost:8090/realms/...  |  Ingress: https://localhost/oauth/realms/...
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
    # Keycloak can take 1–2+ minutes on first boot; without this, nginx often returns 502 until port 8080 listens.
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/null > /dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 45
      start_period: 180s
    volumes:
      - keycloak_data:/opt/keycloak/data

  # LiveKit SFU — optional; uses extra UDP ports (see profile note below).
  livekit:
    profiles: ["livekit"]
    image: livekit/livekit-server:latest
    command: ["--dev", "--bind", "0.0.0.0"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      LIVEKIT_KEYS: "devkey: secretmustbeatleast32byteslong123456"
    depends_on:
      - redis

  # Build and run the Go API inside Compose (optional).
  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      LOG_LEVEL: info
      LOG_FORMAT: json
      # Issuer = JWT "iss". Ingress + SPA via https://localhost/oauth → use this. Direct Keycloak only → http://localhost:8090/realms/master
      KEYCLOAK_ISSUER: https://localhost/oauth/realms/master
      # Must match token "aud" or "azp" (your OIDC client id or audience mapper) — change to your client.
      KEYCLOAK_AUDIENCE: internal-comm-api
      KEYCLOAK_READY_URL: http://keycloak:9000/health/ready
      # Internal JWKS always uses /realms/... on Keycloak HTTP port (no /oauth in container path).
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/master/protocol/openid-connect/certs
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/internal_comm?sslmode=disable

      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  # Nginx ingress: https://host/api/* → api:8080/* ; https://host/oauth/* → keycloak:8080/* (strip /oauth; X-Forwarded-Prefix).
  # Host cert paths (Windows). sanf.cnf is optional reference for OpenSSL; nginx uses cert.pem + key.pem only.
  ingress:
    profiles: ["ingress"]
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - C:/Users/Admin/cert.pem:/etc/nginx/certs/cert.pem:ro
      - C:/Users/Admin/key.pem:/etc/nginx/certs/key.pem:ro
      - C:/Users/Admin/sanf.cnf:/etc/nginx/ssl/sanf.cnf:ro
    depends_on:
      keycloak:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  keycloak_data:
