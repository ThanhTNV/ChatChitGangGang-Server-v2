# Local stack for Internal Comm backend dependencies.
# Usage:
#   docker compose up -d
#   docker compose --profile livekit up -d
#   docker compose --profile app up -d --build
#
# Default ports: Postgres 5432, Redis 6379, MinIO 9000/9001, Keycloak 8090.
#
# Host-run API (go run / IDE): use DATABASE_URL with localhost:5432 — Postgres must be up:
#   docker compose up -d postgres
#   docker compose ps    # expect 127.0.0.1:5432->5432/tcp
# API in Compose (profile app): use host `postgres`, not localhost (see `api` service env).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      # Bind IPv4 loopback so host tools (go run on Windows) reliably reach the container.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/docker/init-db.sql:/docker-entrypoint-initdb.d/10-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Keycloak: Postgres-backed dev mode (realm export/import can be added later).
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command:
      - start-dev
      - --http-port=8080
      - --hostname-strict=false
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - keycloak_data:/opt/keycloak/data

  # LiveKit SFU — optional; uses extra UDP ports (see profile note below).
  livekit:
    profiles: ["livekit"]
    image: livekit/livekit-server:latest
    command: ["--dev", "--bind", "0.0.0.0"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      LIVEKIT_KEYS: "devkey: secretmustbeatleast32byteslong123456"
    depends_on:
      - redis

  # Build and run the Go API inside Compose (optional).
  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      LOG_LEVEL: info
      LOG_FORMAT: json
      # Issuer must match JWT "iss" (tokens from browsers usually use host URL, not service name).
      KEYCLOAK_ISSUER: http://localhost:8090/realms/master
      # JWKS must be reachable from this container: Keycloak listens on 8080 inside its container; 8090 is only the host map.
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/master/protocol/openid-connect/certs
      # Must match token "aud" or "azp" (your OIDC client id or audience mapper) — change to your client.
      KEYCLOAK_AUDIENCE: my-nextjs-app
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/internal_comm?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  keycloak_data:
