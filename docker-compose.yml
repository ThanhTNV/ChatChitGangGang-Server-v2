# Local stack — direct HTTP only (no TLS ingress).
#
# Usage:
#   docker compose up -d
#   docker compose --profile app up -d --build          # + API on http://localhost:8080
#   docker compose --profile livekit up -d
#
# Keycloak: http://localhost:8090/realms/..., http://localhost:8090/admin/
# API (with --profile app): http://localhost:8080
#
# For TLS + https://localhost/api and https://localhost/oauth see docker-compose.ingress.yml
#
# Host-run API (go run): docker compose up -d postgres redis minio keycloak — use .env with 127.0.0.1 ports.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/docker/init-db.sql:/docker-entrypoint-initdb.d/10-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Keycloak at / on :8090 (standard /realms/..., /admin/...). No HTTP relative path — matches direct browser URLs.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command:
      - start-dev
      - --http-port=8080
      - --http-host=0.0.0.0
      - --hostname-strict=false
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/null > /dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 45
      start_period: 180s
    volumes:
      - keycloak_data:/opt/keycloak/data

  livekit:
    profiles: ["livekit"]
    image: livekit/livekit-server:latest
    command: ["--dev", "--bind", "0.0.0.0"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      LIVEKIT_KEYS: "devkey: secretmustbeatleast32byteslong123456"
    depends_on:
      - redis

  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      LOG_LEVEL: info
      LOG_FORMAT: json
      KEYCLOAK_ISSUER: http://localhost:8090/realms/master
      KEYCLOAK_AUDIENCE: internal-comm-api
      KEYCLOAK_READY_URL: http://keycloak:9000/health/ready
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/master/protocol/openid-connect/certs
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/internal_comm?sslmode=disable
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  keycloak_data:
