openapi: 3.0.3
info:
  title: Internal Comm Backend API
  description: |
    HTTP API for the Internal Comm backend (health, readiness, OpenAPI + Swagger UI, authenticated profile, WebSocket entry).
    When Keycloak env vars are unset, `/v1/*` routes are not mounted; `/health`, `/ready`, `/openapi.yaml`, and `/docs` remain available.
  version: 0.1.0

# Default servers block (served URL may be replaced per request). Keep in sync with httpserver.openAPIServersRelative.
servers:
  - url: /
    description: Relative to the server base URL

tags:
  - name: Health
    description: Liveness and readiness
  - name: Profile
    description: Authenticated user (requires Keycloak + `/v1` enabled)
  - name: WebSocket
    description: Real-time entry (stub until chat section E)
  - name: Chat
    description: Channels and messages (REST)

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness probe
      operationId: getHealth
      responses:
        "200":
          description: Process is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      tags: [Health]
      summary: Readiness probe
      operationId: getReady
      description: |
        Aggregates dependency probes in `checks`. Each value is **`ok`**, **`skipped`**, or **`error`**:
        - **database** — Postgres ping when `DATABASE_URL` is set; otherwise `skipped`.
        - **redis** — Redis `PING` when `REDIS_ADDR` is set at process startup; otherwise `skipped`.
        - **keycloak** — HTTP GET `KEYCLOAK_READY_URL` when set, else `KEYCLOAK_ISSUER` when set; otherwise `skipped`. (Keycloak 26+ serves `/health/ready` on the **management port**, default **9000**, not the main HTTP port.)
        - **minio** — HTTP GET `MINIO_USE_SSL` + `MINIO_ENDPOINT` → `{http|https}://<host>/minio/health/live` when `MINIO_ENDPOINT` is set; otherwise `skipped`.

        **503** when any configured (non-skipped) check fails (`error`). **200** when none are `error`.
      responses:
        "200":
          description: No failing checks (skipped checks do not cause failure)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: One or more configured checks returned error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponseError"

  /openapi.yaml:
    get:
      tags: [Health]
      summary: OpenAPI document (this spec)
      operationId: getOpenAPISpec
      responses:
        "200":
          description: OpenAPI 3 YAML
          content:
            application/yaml:
              schema:
                type: string
                format: binary

  /v1/me:
    get:
      tags: [Profile]
      summary: Current user from JWT
      operationId: getMe
      description: |
        Requires `Authorization: Bearer <access_token>`. Upserts `users` row from `sub` and profile claims.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: User upsert failed after valid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/channels:
    get:
      tags: [Chat]
      summary: List channels for the current user
      operationId: listChannels
      description: |
        Returns channels where the authenticated user is a member (`channel_members`).
        Empty list if the user has no memberships. Ordered by `created_at` descending.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Membership-filtered channel list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelListResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Database or internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Chat]
      summary: Create a group channel
      operationId: createChannel
      description: |
        Creates a **group** channel, sets `created_by` to the caller, and adds the caller as an **admin** member.
        Type `direct` is not supported in this API version.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelRequest"
      responses:
        "201":
          description: Channel created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "400":
          description: Invalid body or unsupported type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Database or internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/channels/{channelID}/messages:
    get:
      tags: [Chat]
      summary: List messages in a channel (cursor pagination)
      operationId: listChannelMessages
      description: |
        Returns messages for the channel **only if** the authenticated user is a member (`channel_members`).
        Newest messages first. Use **`next_cursor`** from the previous response as the **`cursor`** query parameter for the next page.
        If the user is not a member (or the channel does not exist), returns **404** with `{"error":"channel not found"}`.
      security:
        - bearerAuth: []
      parameters:
        - name: channelID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque cursor from a prior `next_cursor` (omit for the first page)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Page size (default 50, max 100)
      responses:
        "200":
          description: Message page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageListResponse"
        "400":
          description: Invalid channel id, limit, or cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User is not a member or channel does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Database or internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/ws:
    get:
      tags: [WebSocket]
      summary: WebSocket upgrade (authenticated)
      operationId: connectWebSocket
      description: |
        Validates JWT then upgrades to WebSocket.

        **Token delivery (no `Authorization` header):**
        - Query: `access_token=<JWT>`
        - Or header `Sec-WebSocket-Protocol` containing a single value `bearer.<JWT>` (JWT must not be split on commas).

        On validation failure before upgrade, returns **401** with plain text body.
      parameters:
        - name: access_token
          in: query
          required: false
          schema:
            type: string
          description: Keycloak access token (preferred for browser/mobile WS)
      responses:
        "101":
          description: Switching Protocols — WebSocket established (not exercised in Swagger UI)
        "401":
          description: Missing or invalid token
          content:
            text/plain:
              schema:
                type: string
                example: invalid token
        "500":
          description: User upsert failed after valid token
          content:
            text/plain:
              schema:
                type: string
                example: user sync failed

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Keycloak access token (`openid` / `profile` / `email` scopes recommended)

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    ReadyResponse:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          example: ok
        checks:
          type: object
          description: Keys may include database, redis, keycloak, minio — values ok, skipped, or error
          additionalProperties:
            type: string
          example:
            database: ok
            redis: ok
            keycloak: skipped
            minio: ok

    ReadyResponseError:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          example: error
        checks:
          type: object
          additionalProperties:
            type: string
          example:
            database: ok
            redis: error
            keycloak: skipped
            minio: ok

    MeResponse:
      type: object
      required: [user_id, sub]
      properties:
        user_id:
          type: string
          format: uuid
          description: Internal user row id
        sub:
          type: string
          description: Keycloak subject (`sub` claim)
        email:
          type: string
          description: From token claims (may be empty string)
        preferred_username:
          type: string
          description: From token claims (may be empty string)

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: missing bearer token
          description: >-
            Typical values include `missing bearer token`, `invalid token`, `unauthorized`, `user sync failed`.

    Channel:
      type: object
      required: [id, name, type, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [direct, group]
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time

    ChannelListResponse:
      type: object
      required: [channels]
      properties:
        channels:
          type: array
          items:
            $ref: "#/components/schemas/Channel"

    CreateChannelRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 256
          description: Display name (trimmed; max 256 Unicode code points)
        type:
          type: string
          enum: [group]
          default: group
          description: Must be `group` (omit or empty defaults to `group`)

    Message:
      type: object
      required: [id, channel_id, sender_id, body, created_at]
      properties:
        id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
        sender_id:
          type: string
          format: uuid
        body:
          type: object
          additionalProperties: true
          description: Arbitrary JSON payload (stored as JSONB)
        created_at:
          type: string
          format: date-time
        edited_at:
          type: string
          format: date-time
          nullable: true

    MessageListResponse:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        next_cursor:
          type: string
          description: Present when more older messages exist; pass as `cursor` on the next request
